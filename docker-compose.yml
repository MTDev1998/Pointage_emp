version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: employee_db_container
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: employee_db
    ports:
      - "3307:3306"
    volumes:
      - ./db_data:/var/lib/mysql
      - ./BD/employee_db.sql:/docker-entrypoint-initdb.d/init.sql
